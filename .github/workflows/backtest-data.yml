name: Backtest Market Data Snapshot

# Fetches daily (2021->today) + hourly (~2y) OHLCV for the movers universe and
# commits the snapshot to the branch it was dispatched on. The dev sandbox has
# no direct route to market-data hosts, so the Actions runner does the fetching
# and git carries the data back.

on:
  workflow_dispatch:
  push:
    branches:
      - "claude/market-edge-strategy-ps4w2s"
    paths:
      - "backtest/marketdata/.trigger"

concurrency:
  group: backtest-data-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install yfinance pandas numpy requests

      - name: Fetch market data
        run: python -m backtest.fetch_data

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backtest/marketdata
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "data: refresh backtest market data snapshot"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
